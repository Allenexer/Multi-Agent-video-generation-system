# ── API Providers ──
# 添加新 Provider：复制一个条目，修改 id/name/base_url/api_key/models
# 删除 Provider：移除对应条目
# api_key 支持 ${ENV_VAR} 引用 .env 中的环境变量

providers:
  - id: "siliconflow"
    name: "硅基流动 (SiliconFlow)"
    base_url: "https://api.siliconflow.cn/v1"
    api_key: "${SILICONFLOW_API_KEY}"
    models:
      - id: "deepseek-ai/DeepSeek-V3.2"
        name: "DeepSeek-V3.2"
        type: "text"
        description: "最新旗舰，GPT-5级推理，专为Agent优化，164K上下文"
      - id: "deepseek-ai/DeepSeek-V3.1"
        name: "DeepSeek-V3.1"
        type: "text"
        description: "混合思维模式，工具调用增强"

  - id: "zhipu"
    name: "智谱 AI (Zhipu)"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    api_key: "${ZHIPU_API_KEY}"
    models:
      - id: "glm-5v-turbo"
        name: "GLM-5V-Turbo"
        type: "vision"
        description: "最新多模态视觉模型，200K上下文"
      - id: "glm-4.6v-flash"
        name: "GLM-4.6V-Flash"
        type: "vision"
        description: "免费视觉模型，128K上下文，9B参数"
      - id: "glm-4.6v"
        name: "GLM-4.6V"
        type: "vision"
        description: "全能多模态基座，视频/图像/文件理解"
